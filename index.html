<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AUREM</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@300;400&family=Karla:wght@200;300;400&display=swap" rel="stylesheet">
<style>
  :root {
    --ink: #111110;
    --soft: #666560;
    --faint: #ccc;
  }

  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    height: 100%;
    font-family: 'Karla', sans-serif;
    font-weight: 300;
    overflow: hidden;
  }

  /* ── 2x2 IMAGE GRID BACKGROUND ── */
  .grid-bg {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 0;
    display: grid;
    grid-template-columns: 1fr 1fr;
    grid-template-rows: 1fr 1fr;
  }

  .grid-bg .cell {
    background-size: cover;
    background-position: center;
  }
  .grid-bg .cell:nth-child(1) { background-image: url('1.jpg'); }
  .grid-bg .cell:nth-child(2) { background-image: url('2.jpg'); }
  .grid-bg .cell:nth-child(3) { background-image: url('6.jpg'); }
  .grid-bg .cell:nth-child(4) { background-image: url('5.jpg'); }

  /* ── PAGE LAYOUT ── */
  .page {
    position: relative;
    z-index: 1;
    height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
  }

  /* ── GLASS CARD ── */
  .glass {
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: clamp(36px, 5vw, 68px) clamp(36px, 7vw, 96px);
    background: rgba(255, 255, 255, 0.5);
    backdrop-filter: blur(6px) saturate(1.6);
    -webkit-backdrop-filter: blur(1px) saturate(1.6);
   
    border-radius: 3px;
    box-shadow:
      0 16px 56px rgba(0, 0, 0, 0.18),
      inset 0 1px 0 rgba(255, 255, 255, 0.65);
    opacity: 0;
    animation: up 1.2s cubic-bezier(0.16, 1, 0.3, 1) 0.1s forwards;
  }

  /* ── LOGO ── */
  .logo {
    font-family: 'Playfair Display', serif;
    font-weight: 300;
    font-size: clamp(48px, 10vw, 92px);
    letter-spacing: 0.35em;
    text-indent: 0.35em;
    color: var(--ink);
    line-height: 1;
    margin-bottom: 20px;
    opacity: 0;
    animation: up 1s cubic-bezier(0.16,1,0.3,1) 0.35s forwards;
  }

  /* ── THIN RULE ── */
  .rule {
    width: 28px;
    height: 1px;
    background: rgba(0,0,0,0.2);
    margin-bottom: 20px;
    opacity: 0;
    animation: up 1s cubic-bezier(0.16,1,0.3,1) 0.5s forwards;
  }

  /* ── TAGLINE ── */
  .tagline {
    font-size: 9.5px;
    font-weight: 400;
    letter-spacing: 0.55em;
    text-indent: 0.55em;
    text-transform: uppercase;
    color: var(--soft);
    margin-bottom: 52px;
    opacity: 0;
    animation: up 1s cubic-bezier(0.16,1,0.3,1) 0.6s forwards;
  }

  /* ── COUNTDOWN ── */
  .countdown {
    display: flex;
    align-items: flex-start;
    gap: clamp(20px, 5vw, 52px);
    margin-bottom: 56px;
    opacity: 0;
    animation: up 1s cubic-bezier(0.16,1,0.3,1) 0.72s forwards;
  }

  .unit {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 10px;
  }

  .num {
    font-family: 'Playfair Display', serif;
    font-weight: 300;
    font-size: clamp(32px, 6vw, 52px);
    color: var(--ink);
    line-height: 1;
    min-width: 2ch;
    text-align: center;
    transition: opacity 0.22s ease, transform 0.22s ease;
  }

  .num.tick {
    opacity: 0;
    transform: translateY(-6px);
  }

  .unit-label {
    font-size: 7.5px;
    font-weight: 300;
    letter-spacing: 0.5em;
    text-indent: 0.5em;
    text-transform: uppercase;
    color: var(--soft);
  }

  .sep {
    font-family: 'Playfair Display', serif;
    font-size: 24px;
    font-weight: 300;
    color: rgba(0,0,0,0.2);
    line-height: 1;
    margin-top: 5px;
    user-select: none;
  }

  /* ── EMAIL ── */
  .notify {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 12px;
    opacity: 0;
    animation: up 1s cubic-bezier(0.16,1,0.3,1) 0.86s forwards;
  }

  .notify-label {
    font-size: 9px;
    font-weight: 300;
    letter-spacing: 0.5em;
    text-indent: 0.5em;
    text-transform: uppercase;
    color: var(--soft);
  }

  .notify-row {
    display: flex;
    border-bottom: 1px solid rgba(0,0,0,0.35);
    width: clamp(220px, 40vw, 320px);
    transition: opacity 0.4s;
  }

  .notify-input {
    flex: 1;
    background: transparent;
    border: none;
    outline: none;
    font-family: 'Karla', sans-serif;
    font-size: 12px;
    font-weight: 300;
    letter-spacing: 0.1em;
    color: var(--ink);
    padding: 10px 0;
  }

  .notify-input::placeholder {
    color: rgba(0,0,0,0.25);
    letter-spacing: 0.2em;
    font-size: 11px;
  }

  .notify-btn {
    background: transparent;
    border: none;
    cursor: pointer;
    font-family: 'Karla', sans-serif;
    font-size: 9px;
    font-weight: 400;
    letter-spacing: 0.45em;
    text-transform: uppercase;
    color: var(--ink);
    padding: 10px 0 10px 16px;
    transition: opacity 0.2s;
  }

  .notify-btn:hover { opacity: 0.4; }

  .success {
    font-size: 10px;
    font-weight: 300;
    letter-spacing: 0.2em;
    color: var(--soft);
    font-style: italic;
    opacity: 0;
    transition: opacity 0.6s ease;
    min-height: 16px;
  }
  .success.show { opacity: 1; }

  /* ── FOOTER ── */
  .foot {
    position: fixed;
    bottom: 28px;
    left: 50%;
    transform: translateX(-50%);
    font-size: 8px;
    font-weight: 200;
    letter-spacing: 0.55em;
    text-indent: 0.55em;
    text-transform: uppercase;
    color: rgba(255,255,255,0.7);
    white-space: nowrap;
    opacity: 0;
    animation: up 1s ease 1.1s forwards;
    text-shadow: 0 1px 4px rgba(0,0,0,0.3);
  }

  /* ── KEYFRAMES ── */
  @keyframes up {
    from { opacity: 0; transform: translateY(14px); }
    to   { opacity: 1; transform: translateY(0); }
  }
</style>
</head>
<body>

<!-- 2x2 image grid background -->
<div class="grid-bg">
  <div class="cell"></div>
  <div class="cell"></div>
  <div class="cell"></div>
  <div class="cell"></div>
</div>

<!-- Centered glass card -->
<div class="page">
  <div class="glass">

    <div class="logo">
      <img src="image.png" style="height: 50px;">
    </div>
    <div class="rule"></div>
    <p class="tagline">The collection — coming soon</p>

    <div class="countdown">
      <div class="unit">
        <span class="num" id="d">00</span>
        <span class="unit-label">Days</span>
      </div>
      <span class="sep">/</span>
      <div class="unit">
        <span class="num" id="h">00</span>
        <span class="unit-label">Hours</span>
      </div>
      <span class="sep">/</span>
      <div class="unit">
        <span class="num" id="m">00</span>
        <span class="unit-label">Min</span>
      </div>
      <span class="sep">/</span>
      <div class="unit">
        <span class="num" id="s">00</span>
        <span class="unit-label">Sec</span>
      </div>
    </div>

    <div class="notify">
      <span class="notify-label">Notify me</span>
      <div class="notify-row" id="notifyRow">
        <input class="notify-input" id="email" type="email" placeholder="email address" />
        <button class="notify-btn" onclick="submit()">Send</button>
      </div>
      <span class="success" id="ok">Thank you — we'll be in touch.</span>
    </div>

  </div>
</div>

<p class="foot">Est. 2026 &nbsp;·&nbsp; <br><img src="footer.png" style="padding-top:10px ;width:80px"></p>

<script>
  const launch = new Date();
  launch.setDate(launch.getDate() + 60);
  launch.setHours(12, 0, 0, 0);

  const els = {
    d: document.getElementById('d'),
    h: document.getElementById('h'),
    m: document.getElementById('m'),
    s: document.getElementById('s'),
  };

  function pad(n) { return String(Math.max(0, n)).padStart(2, '0'); }

  function set(el, val) {
    if (el.textContent === val) return;
    el.classList.add('tick');
    setTimeout(() => {
      el.textContent = val;
      el.classList.remove('tick');
    }, 140);
  }

  function tick() {
    const diff = launch - Date.now();
    if (diff <= 0) { ['d','h','m','s'].forEach(k => els[k].textContent = '00'); return; }
    set(els.d, pad(Math.floor(diff / 86400000)));
    set(els.h, pad(Math.floor((diff % 86400000) / 3600000)));
    set(els.m, pad(Math.floor((diff % 3600000) / 60000)));
    set(els.s, pad(Math.floor((diff % 60000) / 1000)));
  }

  tick();
  setInterval(tick, 1000);

  function submit() {
    const v = document.getElementById('email').value.trim();
    if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(v)) {
      const row = document.getElementById('notifyRow');
      row.style.borderBottomColor = '#c0392b';
      setTimeout(() => row.style.borderBottomColor = '', 1000);
      return;
    }
    const row = document.getElementById('notifyRow');
    const label = document.querySelector('.notify-label');
    row.style.opacity = '0';
    label.style.opacity = '0';
    label.style.transition = 'opacity 0.4s';
    setTimeout(() => {
      document.getElementById('ok').classList.add('show');
    }, 400);
  }

  document.getElementById('email').addEventListener('keydown', e => {
    if (e.key === 'Enter') submit();
  });
</script>
</body>
</html>
